<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loop Habit Tracker Lite</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Loop Habit Tracker Lite</h1>
        <p>Track habits, keep streaks, and stay consistent.</p>
      </header>

      <section class="card">
        <form id="habit-form">
          <label for="habit-name">New habit</label>
          <div class="form-row">
            <input id="habit-name" name="habit-name" type="text" placeholder="e.g. Read 10 pages" maxlength="80" required />
            <button type="submit">Add</button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2>Your habits</h2>
        <ul id="habit-list" class="habit-list"></ul>
      </section>
    </main>

    <template id="habit-template">
      <li class="habit-item">
        <div>
          <p class="habit-name"></p>
          <p class="habit-meta"></p>
        </div>
        <div class="actions">
          <button class="toggle-btn"></button>
          <button class="delete-btn delete">Delete</button>
        </div>
      </li>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
